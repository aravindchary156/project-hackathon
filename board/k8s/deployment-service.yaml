# -------------------------------------------------------
# DEPLOYMENT
# -------------------------------------------------------

apiVersion: apps/v1
kind: Deployment

metadata:
  name: boardgame-deployment
  labels:
    app: boardgame

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: boardgame

  template:

    metadata:
      labels:
        app: boardgame

    spec:

      containers:
      - name: boardgame

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        startupProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12

---
# -------------------------------------------------------
# SERVICE
# -------------------------------------------------------

apiVersion: v1
kind: Service

metadata:
  name: boardgame-service
  labels:
    app: boardgame

spec:
  type: LoadBalancer

  selector:
    app: boardgame

  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
